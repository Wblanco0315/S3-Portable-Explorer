<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S3 Portable Explorer</title>
  <script>
    (function() {
      const saved = localStorage.getItem("theme");
      const theme = (saved === "light" || saved === "dark")
        ? saved
        : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      if (theme === "dark") {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    })();
  </script>
</head>

<body>
  <div id="root">
    <style>
      :root {
        --splash-bg: #f8f9ff;
        --splash-logo-bg: #eef4ff;
        --splash-logo-border: rgba(51, 83, 119, 0.2);
        --splash-icon: #335377;
        --splash-text: #161c24;
        --splash-progress-bg: #c3c6cf;
        --splash-progress-fill: #335377;
      }

      html.dark {
        --splash-bg: #0d131e;
        --splash-logo-bg: #161c27;
        --splash-logo-border: rgba(166, 201, 248, 0.2);
        --splash-icon: #a6c9f8;
        --splash-text: #dde2f2;
        --splash-progress-bg: #2f3541;
        --splash-progress-fill: #a6c9f8;
      }

      body {
        margin: 0;
        background-color: var(--splash-bg);
      }

      .splash-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: var(--splash-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .logo-box {
        width: 56px;
        height: 56px;
        background-color: var(--splash-logo-bg);
        border: 1px solid var(--splash-logo-border);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .database-icon {
        width: 24px;
        height: 24px;
        color: var(--splash-icon);
      }

      .splash-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        font-weight: 500;
        margin-top: 20px;
        color: var(--splash-text);
        letter-spacing: -0.01em;
      }

      .progress-bar-container {
        width: 160px;
        height: 2px;
        background-color: var(--splash-progress-bg);
        position: relative;
        overflow: hidden;
        border-radius: 1px;
        margin-top: 16px;
      }

      .progress-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 35%;
        background-color: var(--splash-progress-fill);
        animation: loading-slide 1.5s ease-in-out infinite;
        border-radius: 1px;
      }

      @keyframes loading-slide {
        0% {
          left: -35%;
        }

        100% {
          left: 100%;
        }
      }
    </style>
    <div class="splash-container">
      <div class="logo-box">
        <svg class="database-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
          <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
          <path d="M3 12A9 3 0 0 0 21 12"></path>
        </svg>
      </div>
      <div class="splash-title">Initializing S3 Explorer...</div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
